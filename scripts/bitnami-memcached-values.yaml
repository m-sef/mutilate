# Mirrors the resource sizing and memcached daemon tuning used in
# yaml/memcached.yaml so the Bitnami chart benchmark is apples-to-apples
# with the bare-metal k8s deployment.
resources:
  requests:
    cpu: "19.9"
    memory: "64Gi"
  limits:
    cpu: "19.9"
    memory: "64Gi"

args:
  - /run.sh
  - -t
  - "20"
  - -m
  - "32G"
  - -c
  - "8192"
  - -b
  - "8192"
  - -B
  - "binary"

# Keep memcached off any node running a mutilate-agent pod so benchmark
# traffic doesn't compete with the server it's measuring for CPU/network.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: mutilate-agent
        topologyKey: kubernetes.io/hostname
